title: Automower 220AC
views:
  - title: Automower
    path: automower
    icon: mdi:robot-mower
    type: sections
    max_columns: 3
    dense_section_placement: true
    sections:
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: Status & Styrning
            heading_style: title
            icon: mdi:robot-mower
          - type: vertical-stack
            cards:
              - type: tile
                entity: lawn_mower.automower_220ac
                name: Automower 220AC
                vertical: false
                features_position: bottom
                features:
                  - type: lawn-mower-commands
                    commands:
                      - start_mowing
                      - pause
                      - dock
              - type: custom:mushroom-entity-card
                entity: sensor.amconnect_status_svenska
                name: Status
                icon: mdi:robot-mower
                icon_color: >-
                  {% set s = states('sensor.amconnect_gps_status') | lower %}
                  {% if 'mäh' in s or 'mow' in s %}green
                  {% elif 'lad' in s or 'wartet' in s or 'charg' in s or 'dock' in s %}blue
                  {% elif 'such' in s or 'search' in s %}cyan
                  {% elif 'fest' in s or 'error' in s or 'fel' in s or 'stop' in s %}red
                  {% else %}grey
                  {% endif %}
                fill_container: true
              - type: horizontal-stack
                cards:
                  - type: custom:mushroom-entity-card
                    entity: sensor.amconnect_battery_capacity
                    name: Batteri
                    icon: mdi:battery
                    icon_color: >-
                      {% set b = states('sensor.amconnect_battery_capacity') | int(0) %}
                      {% if b > 60 %}green
                      {% elif b > 25 %}orange
                      {% else %}red{% endif %}
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: binary_sensor.automower_inom_klippschema
                    name: Schema
                    icon: mdi:calendar-check
                    icon_color: >-
                      {{ 'green' if is_state('binary_sensor.automower_inom_klippschema','on') else 'grey' }}
                    fill_container: true
                  - type: custom:mushroom-entity-card
                    entity: sensor.amconnect_weather_mowing_allowed
                    name: Väder
                    icon: mdi:weather-partly-cloudy
                    icon_color: >-
                      {{ 'green' if states('sensor.amconnect_weather_mowing_allowed') == '🟢' else 'red' }}
                    fill_container: true
              - type: custom:mushroom-chips-card
                alignment: center
                chips:
                  - type: template
                    entity: input_boolean.automower_dog_outside
                    icon: mdi:dog
                    icon_color: >-
                      {{ 'orange' if is_state('input_boolean.automower_dog_outside','on') else 'grey' }}
                    content: Hund ute
                    tap_action:
                      action: toggle
                  - type: template
                    entity: input_boolean.automower_manual_block
                    icon: mdi:hand-back-left
                    icon_color: >-
                      {{ 'red' if is_state('input_boolean.automower_manual_block','on') else 'grey' }}
                    content: Block
                    tap_action:
                      action: toggle
                  - type: template
                    entity: input_boolean.automower_weather_block
                    icon: mdi:weather-cloudy-alert
                    icon_color: >-
                      {{ 'orange' if is_state('input_boolean.automower_weather_block','on') else 'grey' }}
                    content: Väder
                    tap_action:
                      action: more-info
                  - type: action
                    icon: mdi:play
                    icon_color: green
                    content: Auto
                    tap_action:
                      action: call-service
                      service: script.turn_on
                      target:
                        entity_id: script.amconnect_gps_auto
                  - type: action
                    icon: mdi:home-import-outline
                    icon_color: blue
                    content: Hem
                    tap_action:
                      action: call-service
                      service: script.turn_on
                      target:
                        entity_id: script.amconnect_gps_home
      - type: grid
        column_span: 2
        cards:
          - type: heading
            heading: Position
            heading_style: title
            icon: mdi:map-marker
          - type: map
            entities:
              - entity: sensor.amconnect_gps_location
                name: Automower
            default_zoom: 18
            hours_to_show: 0
            theme_mode: auto
            aspect_ratio: '21:9'
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: Klippschema
            heading_style: title
            icon: mdi:calendar-clock
          - type: vertical-stack
            cards:
              - type: markdown
                content: >-
                  **Schemat ändras direkt på mowern** (Menu 2-2 / 2-3 + dag-toggles).
                  Tryck på knappen nedan för att läsa av aktuellt schema till HA.
              - type: entities
                title: Schema från mower (faktiska tider)
                show_header_toggle: false
                entities:
                  - entity: sensor.amconnect_mower_schedule_w1
                    name: Pass 1
                  - entity: sensor.amconnect_mower_schedule_w2
                    name: Pass 2
                  - entity: sensor.amconnect_gps_timer_status
                    name: Timer aktiv
                  - entity: binary_sensor.automower_inom_klippschema
                    name: Inom passet just nu
              - show_name: true
                show_icon: true
                show_state: false
                type: button
                entity: script.read_mower_schedule
                name: Läs schemat från mower
                icon: mdi:download
                icon_height: 28px
                tap_action:
                  action: call-service
                  service: script.turn_on
                  target:
                    entity_id: script.read_mower_schedule
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: Väder & Block
            heading_style: title
            icon: mdi:weather-partly-cloudy
          - type: vertical-stack
            cards:
              - type: entities
                title: Block-villkor
                show_header_toggle: false
                entities:
                  - entity: sensor.amconnect_weather_mowing_allowed
                    name: Får klippa nu?
                  - entity: input_boolean.automower_manual_block
                    name: 🖐 Manuell block (du styr)
                  - entity: input_boolean.automower_dog_outside
                    name: 🐕 Hund ute (du styr)
                  - entity: input_boolean.automower_weather_block
                    name: 🌧 Väderblock (auto)
                  - type: attribute
                    entity: sensor.amconnect_weather_stop_triggered
                    attribute: reason
                    name: Väder-anledning
                  - entity: sensor.amconnect_weather_stop_triggered
                    name: Väderstopp triggad
                  - entity: input_boolean.amconnect_gps_rain
                    name: Stoppa vid regn
                  - entity: input_boolean.amconnect_gps_frost
                    name: Stoppa vid frost
                  - entity: input_boolean.amconnect_gps_snow
                    name: Stoppa vid snö
              - type: custom:hourly-weather
                entity: weather.smhi_home
                num_segments: 12
                name: Prognos
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: Statistik
            heading_style: title
            icon: mdi:chart-line
          - type: vertical-stack
            cards:
              - type: glance
                title: Idag (minuter)
                show_state: true
                columns: 4
                entities:
                  - entity: sensor.amconnect_daily_mowing_time
                    name: Klipper
                  - entity: sensor.amconnect_daily_charging_time
                    name: Laddar
                  - entity: sensor.amconnect_daily_searching_time
                    name: Söker
                  - entity: sensor.amconnect_mowing_time_percentage
                    name: Klipp %
              - type: custom:mini-graph-card
                entities:
                  - entity: sensor.amconnect_daily_mowing_time
                    name: Min/dag
                name: Klipptid per dag (7 dygn)
                hours_to_show: 168
                group_by: date
                aggregate_func: max
                show:
                  graph: bar
                  labels: true
              - type: custom:mini-graph-card
                entities:
                  - entity: sensor.amconnect_last_session_length_v3
                    name: Session-längd
                  - entity: sensor.amconnect_session_length_avg_10_v3
                    name: Snitt (10)
                    show_state: true
                name: Sessionslängd (30 dygn — sjunkande = batteridegradering)
                hours_to_show: 720
                points_per_hour: 0.1
                show:
                  graph: bar
                  fill: false
              - type: custom:mini-graph-card
                entities:
                  - sensor.amconnect_gps_battery_voltage
                name: Batterispänning (48 h)
                hours_to_show: 48
                line_width: 2
                points_per_hour: 2
              - type: custom:mini-graph-card
                entities:
                  - sensor.amconnect_gps_battery_temperature
                name: Batteritemperatur (48 h)
                hours_to_show: 48
                line_width: 2
                points_per_hour: 2
              - type: custom:mini-graph-card
                entities:
                  - sensor.amconnect_gps_mowing_rpm
                name: Klippvarvtal (48 h)
                hours_to_show: 48
                line_width: 2
                points_per_hour: 2
              - type: custom:mini-graph-card
                entities:
                  - sensor.amconnect_gps_rssi
                name: WiFi RSSI (48 h)
                hours_to_show: 48
                line_width: 2
                points_per_hour: 2
      - type: grid
        column_span: 1
        cards:
          - type: heading
            heading: Diagnostik & Service
            heading_style: title
            icon: mdi:wrench
          - type: vertical-stack
            cards:
              - type: entities
                title: Sensorer
                show_header_toggle: false
                state_color: true
                entities:
                  - entity: sensor.amconnect_gps_status
                    name: Status (rå tysk)
                  - entity: sensor.amconnect_status_svenska
                    name: Status (svenska)
                  - entity: sensor.amconnect_gps_status_code
                    name: Statuskod
                  - entity: sensor.amconnect_gps_timer_status
                    name: Timer
                  - entity: sensor.amconnect_firmware_version
                    name: Firmware (Husqvarna)
                  - entity: sensor.amconnect_gps_battery_voltage
                    name: Batterispänning
                  - entity: sensor.amconnect_gps_battery_temperature
                    name: Batteritemperatur
                  - entity: sensor.amconnect_gps_battery_capacity_used_mah
                    name: Batteri använt
                  - entity: sensor.amconnect_gps_mowing_rpm
                    name: Klippvarvtal
                  - entity: sensor.amconnect_gps_mowing_strength
                    name: Klipplastström
                  - entity: sensor.amconnect_gps_right_wheel_speed
                    name: Höger hjul
                  - entity: sensor.amconnect_gps_left_wheel_speed
                    name: Vänster hjul
              - type: entities
                title: Tid i state (idag)
                show_header_toggle: false
                entities:
                  - entity: sensor.amconnect_klipptid_idag_h
                    name: Klipper (h)
                  - entity: sensor.amconnect_laddtid_idag_h
                    name: Laddar (h)
                  - entity: sensor.amconnect_soktid_idag_h
                    name: Söker (h)
              - type: entities
                title: Batterihälsa
                show_header_toggle: false
                entities:
                  - entity: sensor.amconnect_battery_health
                    name: Batterihälsa
                  - entity: sensor.amconnect_last_charge_peak
                    name: Senaste peak-laddning
                  - entity: counter.amconnect_charge_cycles
                    name: Laddningscykler (HA-räknad)
                  - entity: sensor.amconnect_battery_seek_start_capacity
                    name: Söker-hem-tröskel (mAh)
                  - entity: sensor.amconnect_battery_last_charging_time
                    name: Tid sedan senaste laddning (min)
                  - entity: sensor.amconnect_battery_total_charging_time
                    name: Total laddtid (min, mowern)
                  - entity: sensor.amconnect_battery_charging_temperature
                    name: Temp under laddning
              - type: entities
                title: Sessionslängd (batterihälsa-trend)
                show_header_toggle: false
                entities:
                  - entity: sensor.amconnect_last_session_length_v3
                    name: Senaste session (min)
                  - entity: sensor.amconnect_session_length_avg_10_v3
                    name: Snitt senaste 10
                  - entity: sensor.amconnect_session_length_avg_30d_v3
                    name: Snitt 30 dygn
                  - entity: sensor.amconnect_session_length_min_30d_v3
                    name: Kortast 30 dygn
                  - entity: sensor.amconnect_session_length_max_30d_v3
                    name: Längst 30 dygn
                  - entity: sensor.amconnect_session_count_30d_v3
                    name: Antal sessioner 30 dygn
                  - type: divider
                  - entity: sensor.amconnect_session_health_v3
                    name: Session-hälsa (vs baseline)
                  - entity: input_number.amconnect_session_baseline_min
                    name: Baseline (min)
                  - entity: input_datetime.amconnect_session_baseline_set
                    name: Baseline satt
              - show_name: true
                show_icon: true
                show_state: false
                type: button
                entity: script.set_session_baseline
                name: 🏁 Sätt baseline (snapshot 30d-snitt)
                icon: mdi:flag-checkered
                icon_height: 28px
                tap_action:
                  action: call-service
                  service: script.turn_on
                  target:
                    entity_id: script.set_session_baseline
              - type: entities
                title: Bladbyte
                show_header_toggle: false
                entities:
                  - entity: sensor.amconnect_blade_replacement_date
                    name: Senaste bladbyte
                  - entity: sensor.amconnect_time_since_last_blade_change
                    name: Tid sedan bladbyte
                  - entity: input_datetime.amconnect_gps_mahmesser_ersetzt
                    name: Justera datum
              - show_name: true
                show_icon: true
                show_state: false
                type: button
                entity: script.reset_blade_replacement_date
                name: Nollställ bladtimer
                icon: mdi:knife
                icon_height: 28px
                tap_action:
                  action: call-service
                  service: script.turn_on
                  target:
                    entity_id: script.reset_blade_replacement_date
      - type: grid
        cards:
          - type: heading
            heading: Nätverk
            heading_style: title
            icon: mdi:wifi
          - type: glance
            show_state: true
            columns: 4
            entities:
              - entity: sensor.amconnect_gps_rssi
                name: RSSI
              - entity: sensor.amconnect_gps_lwt
                name: Online
              - entity: sensor.amconnect_gps_wifi_reconnect_count
                name: Reconnects
              - entity: sensor.amconnect_gps_ip
                name: IP

  - title: Stor karta
    path: karta
    icon: mdi:map-search
    type: panel
    cards:
      - type: vertical-stack
        cards:
          - type: map
            entities:
              - entity: sensor.amconnect_gps_location
                name: Automower
            default_zoom: 19
            hours_to_show: 0
            aspect_ratio: 40%
            theme_mode: light
          - type: glance
            columns: 4
            show_state: true
            entities:
              - entity: sensor.amconnect_status_svenska
                name: Status
              - entity: sensor.amconnect_battery_capacity
                name: Batteri
              - entity: sensor.amconnect_gps_rssi
                name: RSSI
              - entity: sensor.amconnect_gps_lwt
                name: Online
          - type: entities
            title: Senaste GPS-data
            show_header_toggle: false
            entities:
              - entity: sensor.amconnect_gps_coordinates
                name: Koordinater
              - entity: sensor.amconnect_gps_last_known_latitude
                name: Sista kända latitud
              - entity: sensor.amconnect_gps_last_known_longitude
                name: Sista kända longitud
              - entity: sensor.amconnect_gps_ip
                name: IP-adress

  - title: Klippmönster
    path: klippmonster
    icon: mdi:vector-polyline
    type: panel
    cards:
      - type: map
        entities:
          - entity: sensor.amconnect_gps_location
            name: Automower
        default_zoom: 19
        hours_to_show: 24
        aspect_ratio: 100%
        theme_mode: light
