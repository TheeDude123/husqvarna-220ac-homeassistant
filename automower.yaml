###############################################################################
#  AUTOMOWER 220AC  –  All-in-one paket för Home Assistant
#  ---------------------------------------------------------------------------
#  Här finns ALLT som hör till gräsklipparen:
#    • helpers (input_boolean, input_datetime, input_select, counter)
#    • utility_meter (dygnsstatistik)
#    • MQTT lawn_mower-entitet + alla MQTT-sensorer
#    • Template-sensorer (status-emoji, batteri%, väderstopp m.m.)
#    • Scripts (kommandon till mowern, läs-schema, bladbyte)
#    • Automationer (väderblock, räknare, periodisk uppdatering, schema-resume)
#
#  Schema: ändras direkt på mowern (Menu 2-2 / 2-3 + dag-toggles).
#  HA läser bara av schemat via knappen "Läs schemat från mower".
#
#  Installation (gör en gång, sedan rör du bara denna fil):
#    1. Spara filen som  /config/automower.yaml
#    2. I configuration.yaml lägg till under  homeassistant: → packages:
#         automower: !include automower.yaml
#    3. Ta bort dubbletter ur dina gamla filer – se AUTOMOWER_INSTALLATION.md
#    4. Starta om Home Assistant
###############################################################################


#==============================================================================
# 1. HELPERS
#==============================================================================
# Schemaläggning sker direkt på mowerns fysiska menyer (Menu 2-2/2-3 + dag-
# toggles). HA läser bara av schemat via script.read_mower_schedule.
input_boolean:
  automower_dog_outside:
    name: "Hund ute (paus mower)"
    icon: mdi:dog
  # AUTO – styrs av väderautomationen utifrån SMHI. Klicka inte här manuellt;
  # det skrivs över så fort vädret ändras. Använd automower_manual_block istället.
  automower_weather_block:
    name: "Väderblockering (auto)"
    icon: mdi:weather-cloudy-alert
  # MANUELL – bara DU styr denna. Ingen automation rör den nånsin.
  # Använd när lokala förhållanden skiljer sig från SMHI:s prognos
  # (det regnar på din gård fast SMHI tror motsatsen, etc.).
  automower_manual_block:
    name: "Manuell blockering"
    icon: mdi:hand-back-left
  amconnect_gps_rain:
    name: "Stoppa vid regn"
    icon: mdi:weather-rainy
  amconnect_gps_frost:
    name: "Stoppa vid frost"
    icon: mdi:snowflake-melt
  amconnect_gps_snow:
    name: "Stoppa vid snö"
    icon: mdi:snowflake
  # Markör som sätts om mowern hamnar i fel/stuck-state under en session.
  # Resetas vid session-start. Session-längd-sensorn skippar då uppdatering
  # för att hålla statistiken ren från sessions där mowern stått stilla
  # och rapporterat fel timmar i sträck.
  amconnect_session_had_error:
    name: "Session hade fel (intern markör)"
    icon: mdi:alert-circle
  # Markör som sätts om sessionen avbröts externt:
  # - Väderblock aktiverades (regn, frost, snö)
  # - Manuellt block aktiverades (du klickade)
  # - Hund ute aktiverades
  # - Klippschemats fönster tog slut (mowern på väg hem pga schema-end)
  # I alla fall: sessionen var inte batteribegränsad, så den ska INTE
  # användas för att bedöma batterihälsa. Resetas vid session-start.
  amconnect_session_externally_ended:
    name: "Session avbruten externt (intern markör)"
    icon: mdi:cancel

input_datetime:
  amconnect_gps_mahmesser_ersetzt:
    name: "Senaste bladbyte"
    has_date: true
    has_time: false
  # Sparas vid varje docked → mowing-övergång. Används av trigger-baserad
  # template-sensor för att räkna ut session-längd när mowern dockar igen.
  amconnect_session_start:
    name: "Senaste session start"
    has_date: true
    has_time: true
  # Datumet då session-baseline senast snapshottades
  amconnect_session_baseline_set:
    name: "Session-baseline satt"
    has_date: true
    has_time: false
  # Tidsstämpel för senaste "mowern svarar inte"-notis.
  # Används av script.amconnect_gps_home för att undvika notis-spam:
  # max ett kritiskt larm per timme, även om weather-block eller dog-out
  # triggar hem-scriptet flera ggr på kort tid pga flaky WiFi.
  amconnect_last_critical_alert:
    name: "Senaste kritiska mower-notis"
    has_date: true
    has_time: true
  # Cooldown för "klipparen körde ut trots block"-larmet.
  amconnect_last_escaped_alert:
    name: "Senaste 'mower stack iväg'-notis"
    has_date: true
    has_time: true

input_number:
  # Snapshot av 30d session-snittet vid en tidpunkt då batteriet bedömdes
  # friskt. Vidareberäknas till "session health %" som visar hur långt under
  # baseline vi ligger nu.
  amconnect_session_baseline_min:
    name: "Session-baseline (min)"
    min: 0
    max: 360
    step: 0.1
    mode: box
    icon: mdi:flag-checkered

input_select:
  amgps_modus:
    name: "Mower-läge"
    options: [Auto, Manual, Home, Stop]
    initial: Stop
    icon: mdi:robot-mower


counter:
  # Händelse-räknare (inte tid) — laddningscykler ökar 1 vid varje
  # övergång från Laden → Mähen. Persisterar över HA-omstart automatiskt.
  amconnect_charge_cycles: { name: "Laddningscykler", initial: 0, step: 1 }


#==============================================================================
# 2. STATISTIK (history_stats – frågar recorder-DB istället för att räkna upp)
#==============================================================================
# history_stats är HA:s inbyggda "hur lång tid har entiteten varit i state X
# under period Y"-sensor. Skillnaden mot counters med time_pattern:
#   - Räknar inte i realtid — frågar databasen
#   - HA-omstart förlorar ingen tid (DB hade staten innan/efter)
#   - Återställs automatiskt vid midnatt via start: today_at()
#   - Hanterar minute-trigger-glapp korrekt
sensor:
  # OBS: använder den RÅA tyska status-strängen (sensor.amconnect_gps_status)
  # istället för lawn_mower-state. Anledning: lawn_mower mappar både "Laden"
  # och "Wartet in Ladestation" till "docked", så "Laddtid" räknade även
  # passiv standby över natten. Här listar vi explicit vilka tyska strängar
  # som räknas till varje kategori.
  - platform: history_stats
    name: "AMConnect Klipptid Idag h"
    unique_id: amconnect_klipptid_idag_h
    entity_id: sensor.amconnect_gps_status
    state:
      - "Mähen"
      - "Mähwerk starten"
      - "Mähwerk gestartet"
      - "Starte Mähen"
      - "Mowing"
      - "Viereckmodus"
      - "Verlässt Ladestation"
      - "Folgt Begrenzung"
      - "Kollision"
      - "N-Signal gefunden"
    type: time
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  # Bara AKTIV laddning räknas. "Wartet in Ladestation" = fulladdad och
  # idle, ska inte räknas som laddtid.
  - platform: history_stats
    name: "AMConnect Laddtid Idag h"
    unique_id: amconnect_laddtid_idag_h
    entity_id: sensor.amconnect_gps_status
    state:
      - "Laden"
      - "Charging"
    type: time
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  - platform: history_stats
    name: "AMConnect Söktid Idag h"
    unique_id: amconnect_soktid_idag_h
    entity_id: sensor.amconnect_gps_status
    state:
      - "Suchen"
      - "Fährt zur Ladestation"
      - "Andocken"
      - "Folgt Suchschleife"
      - "Schleife folgen"
      - "Searching"
    type: time
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  # Bonus: tid i Wartet-läge (idle vid dockan), kan vara nyttigt att se
  - platform: history_stats
    name: "AMConnect Idletid Idag h"
    unique_id: amconnect_idletid_idag_h
    entity_id: sensor.amconnect_gps_status
    state:
      - "Wartet in Ladestation"
      - "Wartet auf Einsatz"
    type: time
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  # --- Sessionslängd-statistik (batterihälsa-trend) ---------------------
  # Snitt av sensor.amconnect_last_session_length_v3 (uppdateras vid varje
  # session-slut). När sessions blir kortare över tid = batteri degraderar.
  #
  # OBS: v3-suffix på unique_id + name infört för att tvinga HA att skapa
  # fräscha entiteter (de gamla bär på korrupt restore-state efter en
  # session där mowern fastnade i 40 min). Gamla entiteter blir orphans
  # vid restart — radera dem i Entity Registry när du är hemma.
  - platform: statistics
    name: "AMConnect Session Length Avg (10) v3"
    unique_id: amconnect_session_length_avg_10_v3
    entity_id: sensor.amconnect_last_session_length_v3
    state_characteristic: mean
    sampling_size: 10

  - platform: statistics
    name: "AMConnect Session Length Avg (30d) v3"
    unique_id: amconnect_session_length_avg_30d_v3
    entity_id: sensor.amconnect_last_session_length_v3
    state_characteristic: mean
    max_age:
      days: 30

  - platform: statistics
    name: "AMConnect Session Length Min (30d) v3"
    unique_id: amconnect_session_length_min_30d_v3
    entity_id: sensor.amconnect_last_session_length_v3
    state_characteristic: value_min
    max_age:
      days: 30

  - platform: statistics
    name: "AMConnect Session Length Max (30d) v3"
    unique_id: amconnect_session_length_max_30d_v3
    entity_id: sensor.amconnect_last_session_length_v3
    state_characteristic: value_max
    max_age:
      days: 30

  - platform: statistics
    name: "AMConnect Session Count (30d) v3"
    unique_id: amconnect_session_count_30d_v3
    entity_id: sensor.amconnect_last_session_length_v3
    state_characteristic: count
    max_age:
      days: 30


#==============================================================================
# 3. MQTT  (lawn_mower-entitet + alla sensorer)
#==============================================================================
mqtt:
  # --- LAWN_MOWER-ENTITET ---------------------------------------------------
  # OBS: lawn_mower-schemat använder activity_state_topic (inte state_topic)
  # och activity_value_template – specifikt för denna domän.
  lawn_mower:
    - name: "Automower 220AC"
      unique_id: automower_220ac_mqtt
      activity_state_topic: "AM220AC/status"
      activity_value_template: >-
        {% set s = value | lower %}
        {% if s in ['wartet in ladestation', 'laden', 'docked'] %}docked
        {% elif s in ['mähen', 'mähwerk starten', 'mähwerk gestartet',
                      'starte mähen', 'mowing', 'viereckmodus',
                      'verlässt ladestation', 'folgt begrenzung',
                      'kollision', 'n-signal gefunden',
                      'festgefahren'] %}mowing
        {% elif s in ['suchen', 'fährt zur ladestation', 'andocken',
                      'folgt suchschleife', 'schleife folgen'] %}returning
        {% elif s in ['stop', 'paused', 'wartet auf einsatz'] %}paused
        {% elif s == 'fehler'
                or 'blockiert' in s or 'defekt' in s or 'ausserhalb' in s
                or 'hochgehoben' in s or 'niedrige' in s or 'schlupf' in s
                or 'pin abgelaufen' in s or 'manuelles laden' in s
                or 'kein schleifensignal' in s or 'kein kontakt' in s %}error
        {% else %}none{% endif %}
      start_mowing_command_topic: "AM220AC/command"
      start_mowing_command_template: "setModeAuto"
      pause_command_topic: "AM220AC/command"
      pause_command_template: "setModeStop"
      dock_command_topic: "AM220AC/command"
      dock_command_template: "setModeHome"

  # --- MQTT-SENSORER --------------------------------------------------------
  sensor:
    - name: "AMConnect GPS Status"
      state_topic: "AM220AC/status"
      unique_id: amconnect_gps_status
      icon: mdi:robot-mower
      value_template: "{{ value | default('Unknown') }}"

    - name: "AMConnect GPS Status Code"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_gps_status_code
      value_template: >
        {% if value and 'Status Code:' in value %}
          {{ value.split('Status Code: ')[1] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_gps_status_code') | int(0) }}
        {% endif %}

    - name: "AMConnect GPS Coordinates"
      state_topic: "AM220AC/location"
      unique_id: amconnect_gps_coordinates
      icon: mdi:map-marker
      value_template: "{{ value | default('0,0') }}"

    - name: "AMConnect GPS Latitude"
      state_topic: "AM220AC/location"
      unique_id: amconnect_gps_latitude
      unit_of_measurement: "°"
      icon: mdi:latitude
      value_template: >
        {% if value and ',' in value %}
          {{ value.split(',')[0] | float(0) | round(6) }}
        {% else %}
          {{ states('sensor.amconnect_gps_latitude') | float(0) }}
        {% endif %}

    - name: "AMConnect GPS Longitude"
      state_topic: "AM220AC/location"
      unique_id: amconnect_gps_longitude
      unit_of_measurement: "°"
      icon: mdi:longitude
      value_template: >
        {% if value and ',' in value %}
          {{ value.split(',')[1] | float(0) | round(6) }}
        {% else %}
          {{ states('sensor.amconnect_gps_longitude') | float(0) }}
        {% endif %}

    - name: "AMConnect GPS Last Known Latitude"
      state_topic: "AM220AC/location"
      unique_id: amconnect_gps_last_known_latitude
      unit_of_measurement: "°"
      icon: mdi:latitude
      value_template: >
        {% set prev = states('sensor.amconnect_gps_last_known_latitude') | float(0) %}
        {% if value and ',' in value %}
          {{ value.split(',')[0] | float(prev) | round(6) }}
        {% else %}
          {{ prev }}
        {% endif %}

    - name: "AMConnect GPS Last Known Longitude"
      state_topic: "AM220AC/location"
      unique_id: amconnect_gps_last_known_longitude
      unit_of_measurement: "°"
      icon: mdi:longitude
      value_template: >
        {% set prev = states('sensor.amconnect_gps_last_known_longitude') | float(0) %}
        {% if value and ',' in value %}
          {{ value.split(',')[1] | float(prev) | round(6) }}
        {% else %}
          {{ prev }}
        {% endif %}

    - name: "AMConnect GPS Battery Voltage"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_gps_battery_voltage
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      value_template: >
        {% if value and 'Battery Voltage:' in value %}
          {{ (value.split('Battery Voltage: ')[1] | float(0) / 1000) | round(2) }}
        {% else %}
          {{ states('sensor.amconnect_gps_battery_voltage') | float(0) }}
        {% endif %}

    - name: "AMConnect GPS Battery Temperature"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_gps_battery_temperature
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      # Rimlighetsfilter: NiMH-batteri kan inte vara <−20 eller >80 °C.
      # Firmware skickar ibland skräpvärden (~12500) som ger spikar i grafen
      # → behåll föregående giltiga värde istället.
      value_template: >-
        {%- set prev = states('sensor.amconnect_gps_battery_temperature') | int(0) -%}
        {%- if value and 'Battery temperature:' in value -%}
          {%- set raw = value.split('Battery temperature: ')[1].split()[0] | int(99999) -%}
          {{ raw if -20 <= raw <= 80 else prev }}
        {%- else -%}
          {{ prev }}
        {%- endif -%}

    - name: "AMConnect GPS Battery Capacity Used (mAh)"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_gps_battery_capacity_used_mah
      unit_of_measurement: "mAh"
      value_template: >
        {% if value and 'Battery Capacity Used (mAh):' in value %}
          {{ value.split('Battery Capacity Used (mAh): ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_gps_battery_capacity_used_mah') | int(0) }}
        {% endif %}

    - name: "AMConnect GPS Mowing RPM"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_gps_mowing_rpm
      unit_of_measurement: "rpm"
      state_class: measurement
      value_template: >
        {% if value and 'Speed of Knife engine:' in value %}
          {{ value.split('Speed of Knife engine: ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_gps_mowing_rpm') | int(0) }}
        {% endif %}

    - name: "AMConnect GPS Mowing Strength"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_gps_mowing_strength
      unit_of_measurement: "mA"
      device_class: current
      state_class: measurement
      value_template: >
        {% if value and 'Battery capacity (mA):' in value %}
          {{ value.split('Battery capacity (mA): ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_gps_mowing_strength') | int(0) }}
        {% endif %}

    - name: "AMConnect GPS Right Wheel Speed"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_gps_right_wheel_speed
      unit_of_measurement: "cm/s"
      value_template: >
        {% if value and 'Right wheel speed:' in value %}
          {{ value.split('Right wheel speed: ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_gps_right_wheel_speed') | int(0) }}
        {% endif %}

    - name: "AMConnect GPS Left Wheel Speed"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_gps_left_wheel_speed
      unit_of_measurement: "cm/s"
      value_template: >
        {% if value and 'Left wheel speed:' in value %}
          {{ value.split('Left wheel speed: ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_gps_left_wheel_speed') | int(0) }}
        {% endif %}

    - name: "AMConnect GPS Mowing Time"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_gps_mowing_time
      unit_of_measurement: "min"
      value_template: >
        {% if value and 'Mowing time:' in value %}
          {{ value.split('Mowing time: ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_gps_mowing_time') | int(0) }}
        {% endif %}

    - name: "AMConnect GPS Timer Status"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_gps_timer_status
      value_template: >
        {% if value and 'Timer Status:' in value %}
          {{ value.split('Timer Status:')[1].split()[0] }}
        {% else %}
          {{ states('sensor.amconnect_gps_timer_status') }}
        {% endif %}

    - name: "AMConnect GPS RSSI"
      state_topic: "AM220AC/rssi"
      unique_id: amconnect_gps_rssi
      unit_of_measurement: "dBm"
      device_class: signal_strength
      state_class: measurement
      value_template: >
        {% if value and value | length > 0 %}
          {{ value | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_gps_rssi') | int(0) }}
        {% endif %}

    - name: "AMConnect GPS IP"
      state_topic: "AM220AC/ip"
      unique_id: amconnect_gps_ip
      icon: mdi:ip-network
      value_template: "{{ value | default('Unknown') }}"

    - name: "AMConnect GPS WiFi Reconnect Count"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_gps_wifi_reconnect_count
      icon: mdi:wifi-refresh
      value_template: >
        {% if value and 'WiFi Reconnect Count:' in value %}
          {{ value.split('WiFi Reconnect Count: ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_gps_wifi_reconnect_count') | int(0) }}
        {% endif %}

    - name: "AMConnect GPS LWT"
      state_topic: "AM220AC/lwt"
      unique_id: amconnect_gps_lwt
      value_template: "{{ 1 if (value and 'Online' in value) else 0 }}"

    # --- Timer-fält från mowern (16 st via debug-topic) ---------------------
    # Triggas av script.read_mower_schedule som skickar getWeekTimer* kommandon.
    # Firmware svarar via AM220AC/debug t.ex. "Week Timer1 Start Hour: 8".
    - name: "AMConnect Mower W1 Start H"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_mower_w1_start_h
      value_template: >
        {% if value and 'Week Timer1 Start Hour:' in value %}
          {{ value.split('Week Timer1 Start Hour: ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_mower_w1_start_h') | int(0) }}
        {% endif %}

    - name: "AMConnect Mower W1 Start M"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_mower_w1_start_m
      value_template: >
        {% if value and 'Week Timer1 Start Minute:' in value %}
          {{ value.split('Week Timer1 Start Minute: ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_mower_w1_start_m') | int(0) }}
        {% endif %}

    - name: "AMConnect Mower W1 Stop H"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_mower_w1_stop_h
      value_template: >
        {% if value and 'Week Timer1 Stop Hour:' in value %}
          {{ value.split('Week Timer1 Stop Hour: ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_mower_w1_stop_h') | int(0) }}
        {% endif %}

    - name: "AMConnect Mower W1 Stop M"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_mower_w1_stop_m
      value_template: >
        {% if value and 'Week Timer1 Stop Minute:' in value %}
          {{ value.split('Week Timer1 Stop Minute: ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_mower_w1_stop_m') | int(0) }}
        {% endif %}

    - name: "AMConnect Mower W2 Start H"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_mower_w2_start_h
      value_template: >
        {% if value and 'Week Timer2 Start Hour:' in value %}
          {{ value.split('Week Timer2 Start Hour: ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_mower_w2_start_h') | int(0) }}
        {% endif %}

    - name: "AMConnect Mower W2 Start M"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_mower_w2_start_m
      value_template: >
        {% if value and 'Week Timer2 Start Minute:' in value %}
          {{ value.split('Week Timer2 Start Minute: ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_mower_w2_start_m') | int(0) }}
        {% endif %}

    - name: "AMConnect Mower W2 Stop H"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_mower_w2_stop_h
      value_template: >
        {% if value and 'Week Timer2 Stop Hour:' in value %}
          {{ value.split('Week Timer2 Stop Hour: ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_mower_w2_stop_h') | int(0) }}
        {% endif %}

    - name: "AMConnect Mower W2 Stop M"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_mower_w2_stop_m
      value_template: >
        {% if value and 'Week Timer2 Stop Minute:' in value %}
          {{ value.split('Week Timer2 Stop Minute: ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_mower_w2_stop_m') | int(0) }}
        {% endif %}

    # --- Extra info-sensorer ---------------------------------------------
    # Kräver att firmware publicerar till dessa topics. Lägg till i
    # AMConnect_GPS_config.h om de saknas:
    #   const char* mqtt_uptime_topic    = "AM220AC/uptime";
    #   const char* mqtt_freeheap_topic  = "AM220AC/freeheap";
    # och säkerställ att handle_uptime() / handle_free_heap() kallas från
    # din update-rutin (eller skicka getUptime / getFreeHeap via MQTT).

    - name: "AMConnect Uptime"
      state_topic: "AM220AC/uptime"
      unique_id: amconnect_uptime
      icon: mdi:clock-outline
      value_template: "{{ value | default('Unknown') }}"

    - name: "AMConnect Free Heap"
      state_topic: "AM220AC/freeheap"
      unique_id: amconnect_free_heap
      unit_of_measurement: "B"
      icon: mdi:memory
      state_class: measurement
      value_template: >
        {% if value and value | length > 0 %}
          {{ value | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_free_heap') | int(0) }}
        {% endif %}

    - name: "AMConnect MQTT Reconnect Count"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_mqtt_reconnect_count
      icon: mdi:server-network-off
      value_template: >
        {% if value and 'MQTT Reconnect Count:' in value %}
          {{ value.split('MQTT Reconnect Count: ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_mqtt_reconnect_count') | int(0) }}
        {% endif %}

    - name: "AMConnect Firmware Version"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_firmware_version
      icon: mdi:chip
      value_template: >
        {% if value and 'Firmware version:' in value %}
          {{ value.split('Firmware version: ')[1].split()[0] }}
        {% else %}
          {{ states('sensor.amconnect_firmware_version') | default('?') }}
        {% endif %}

    # --- Utökade batteridiagnostik-sensorer ------------------------------
    # Strängarna är BÄSTA GISSNING baserat på mönstret i AMConnect.h-kommentarer.
    # Om sensorn aldrig populeras: kolla AM220AC/debug live och justera strängen.

    - name: "AMConnect Battery Seek Start Capacity"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_battery_seek_start_capacity
      unit_of_measurement: "mAh"
      icon: mdi:battery-arrow-down
      value_template: >
        {% if value and 'Battery seek start capacity:' in value %}
          {{ value.split('Battery seek start capacity: ')[1].split()[0] | int(0) }}
        {% else %}
          {{ states('sensor.amconnect_battery_seek_start_capacity') | int(0) }}
        {% endif %}

    # OBS: prozzerg labellar detta "Last charging time" men beteendet visar
    # att det är SEKUNDER sedan senaste laddning slutade (klättrar uppåt
    # under klippning, nollställs vid laddstart). Konverterar till minuter.
    - name: "AMConnect Time Since Last Charge"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_battery_last_charging_time
      unit_of_measurement: "min"
      icon: mdi:battery-clock-outline
      value_template: >
        {% if value and 'Last charging time:' in value %}
          {{ (value.split('Last charging time: ')[1].split()[0] | int(0) / 60) | round(1) }}
        {% else %}
          {{ states('sensor.amconnect_battery_last_charging_time') | float(0) }}
        {% endif %}

    # OBS: använder startswith() istället för "in value" eftersom strängen
    # "Charging time:" är en SUFFIX av "Last charging time:" → utan strikt
    # match skulle båda sensorer fånga samma meddelande.
    - name: "AMConnect Battery Total Charging Time"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_battery_total_charging_time
      unit_of_measurement: "min"
      icon: mdi:battery-clock
      state_class: total_increasing
      value_template: >-
        {%- if value and value.startswith('Charging time:') -%}
          {{ value.split('Charging time: ')[1].split()[0] | int(0) }}
        {%- else -%}
          {{ states('sensor.amconnect_battery_total_charging_time') | int(0) }}
        {%- endif -%}

    - name: "AMConnect Battery Charging Temperature"
      state_topic: "AM220AC/debug"
      unique_id: amconnect_battery_charging_temperature
      unit_of_measurement: "°C"
      device_class: temperature
      state_class: measurement
      icon: mdi:thermometer-lines
      value_template: >-
        {%- set prev = states('sensor.amconnect_battery_charging_temperature') | int(0) -%}
        {%- if value and 'Battery charging temperature:' in value -%}
          {%- set raw = value.split('Battery charging temperature: ')[1].split()[0] | int(99999) -%}
          {{ raw if -20 <= raw <= 80 else prev }}
        {%- else -%}
          {{ prev }}
        {%- endif -%}

    # OBS: tidigare fanns klock-sensorer här (amconnect_mower_hour/minute).
    # Borttagna eftersom 220AC:s protokoll-läsbara RTC inte synkar med
    # displayens klocka — protokollet returnerar konsekvent 06 oavsett
    # mowerns faktiska tid. Trolig orsak: två separata klock-register, eller
    # att 0xB5/0xB3 inte mappar till "Current hour/minute" på 220AC trots
    # vad prozzergs comment påstår.


#==============================================================================
# 4. TEMPLATE-SENSORER
#==============================================================================
template:
  # --- Binary sensor: är vi inom klippschemat just nu? ---------------------
  # 220AC har bara ett schema (W1/W2) som gäller alla dagar — dag-toggles
  # sätts separat på mowern. Kontrollerar båda passen, returnerar "on" om
  # vi är inom någon. Tomma fönster (00:00 - 00:00 eller unknown) ignoreras.
  #
  # OBS: Dag-toggles (klipp inte tisdag) sätts på mowern. HA känner inte
  # till dem, så denna sensor säger "on" oavsett vilken veckodag det är.
  # Det är bara för dashboard-display — räknare har egen logik via
  # history_stats på den faktiska mower-status.
  - binary_sensor:
      - name: "Automower – Inom klippschema"
        unique_id: automower_within_schedule
        icon: mdi:calendar-check
        state: >-
          {%- set now_t = now().strftime('%H:%M') -%}
          {%- set schedules = [
              states('sensor.amconnect_mower_schedule_w1'),
              states('sensor.amconnect_mower_schedule_w2')
            ] -%}
          {%- set ns = namespace(in_window=false) -%}
          {%- for s in schedules -%}
            {%- if s and ' - ' in s -%}
              {%- set start = s.split(' - ')[0] -%}
              {%- set stop = s.split(' - ')[1] -%}
              {%- if start != stop and start <= now_t <= stop -%}
                {%- set ns.in_window = true -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {{ ns.in_window }}

  - sensor:
      # Position med lat/long som ATTRIBUT – används av map-kortet
      - name: "AMConnect GPS Location"
        unique_id: amconnect_gps_location
        icon: mdi:map-marker-radius
        state: >
          {% if 'wartet' in states('sensor.amconnect_gps_status') | lower
                or 'laden' in states('sensor.amconnect_gps_status') | lower
                or 'docked' in states('sensor.amconnect_gps_status') | lower %}
            Laddstation
          {% else %}
            Klipper
          {% endif %}
        attributes:
          latitude:  "{{ states('sensor.amconnect_gps_latitude')  | float(0) }}"
          longitude: "{{ states('sensor.amconnect_gps_longitude') | float(0) }}"

      # Batteri% baserat på kvarvarande mAh (NiMH 2200 mAh).
      # OBS: Firmwarens sensor heter "Battery Capacity Used (mAh)" men
      # rapporterar i verkligheten KVARVARANDE mAh, inte använda.
      #
      # Skalan kalibrerad mot observerat beteende:
      #   2200 mAh = full = 100%
      #    850 mAh = mowern söker hem (reservbuffert) = 0%
      # Allt under 850 mAh = 0% (säkerhetsreserv som mowern aldrig
      # förbrukar i normalt bruk).
      - name: "AMConnect Battery Capacity %"
        unique_id: amconnect_battery_capacity_percent
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        state: >
          {% set remaining = states('sensor.amconnect_gps_battery_capacity_used_mah') | int(0) %}
          {% set reserv = 850 %}
          {% set full = 2200 %}
          {% set usable = full - reserv %}
          {% set pct = ((remaining - reserv) / usable * 100) | round(0) if usable > 0 else 0 %}
          {{ [[pct, 0] | max, 100] | min }}

      # Batteri% baserat på spänning – KALIBRERAT FÖR NiMH 18V (Automower 220AC)
      # NiMH-celler: ~1.0V tom, ~1.2V nominell, ~1.45V max charge
      # 15-cellsbatteri: 15V tom, 18V nominell, ~21V vid pågående laddning
      # OBS: NiMH har plattare spänningskurva än Li-ion, så % är ungefärlig.
      - name: "AMConnect Battery Charge"
        unique_id: amconnect_battery_charge
        unit_of_measurement: "%"
        device_class: battery
        state_class: measurement
        state: >
          {% set v = states('sensor.amconnect_gps_battery_voltage') | float(0) %}
          {% set vmin = 17.0 %}
          {% set vmax = 20.0 %}
          {% if v >= vmin %}
            {{ [[((v - vmin) / (vmax - vmin) * 100) | round(0), 0] | max, 100] | min }}
          {% else %}
            0
          {% endif %}

      # Väderstopp – matchar SMHI's engelska state-strängar korrekt
      - name: "AMConnect Weather Stop Triggered"
        unique_id: amconnect_weather_stop_triggered
        state: >
          {% set w = states('weather.smhi_home') %}
          {% set t = state_attr('weather.smhi_home', 'temperature') | float(99) %}
          {% set p = state_attr('weather.smhi_home', 'precipitation_intensity') | float(0) %}
          {% set rain  = w in ['rainy','pouring'] and is_state('input_boolean.amconnect_gps_rain','on') %}
          {% set frost = t < 3 and is_state('input_boolean.amconnect_gps_frost','on') %}
          {% set snow  = t < 0 and p > 0 and is_state('input_boolean.amconnect_gps_snow','on') %}
          {{ 'true' if (rain or frost or snow) else 'false' }}
        attributes:
          reason: >
            {% set w = states('weather.smhi_home') %}
            {% set t = state_attr('weather.smhi_home', 'temperature') | float(99) %}
            {% set p = state_attr('weather.smhi_home', 'precipitation_intensity') | float(0) %}
            {% if w in ['rainy','pouring'] and is_state('input_boolean.amconnect_gps_rain','on') %}Regn
            {% elif t < 3 and is_state('input_boolean.amconnect_gps_frost','on') %}Frost
            {% elif t < 0 and p > 0 and is_state('input_boolean.amconnect_gps_snow','on') %}Snö
            {% else %}Inget{% endif %}

      - name: "AMConnect Weather Mowing Allowed"
        unique_id: amconnect_weather_mowing_allowed
        state: >
          {{ '🟢' if states('sensor.amconnect_weather_stop_triggered') == 'false' else '❌' }}

      # --- Session-hälsa relativt baseline ---------------------------------
      # 100% = sessions lika långa som baseline. 80% = sessions 20% kortare.
      # Räknar bara om både baseline OCH current är meningsfulla värden.
      - name: "AMConnect Session Health v3"
        unique_id: amconnect_session_health_v3
        unit_of_measurement: "%"
        icon: mdi:trending-down
        state: >-
          {%- set baseline = states('input_number.amconnect_session_baseline_min') | float(0) -%}
          {%- set current = states('sensor.amconnect_session_length_avg_30d_v3') | float(0) -%}
          {%- if baseline > 0 and current > 0 -%}
            {{ (current / baseline * 100) | round(0) }}
          {%- else -%}
            0
          {%- endif -%}

      - name: "AMConnect Blade Replacement Date"
        unique_id: amconnect_blade_replacement_date
        icon: mdi:calendar
        state: >
          {{ as_timestamp(states('input_datetime.amconnect_gps_mahmesser_ersetzt')
             | default('1970-01-01 00:00:00')) | timestamp_custom('%d.%m.%Y') }}

      # Bladtimer-sensor flyttad till trigger-baserad nedan (se "trigger:"-blocket)
      # Uppdateras max 1 gång per timme istället för varje minut, och visar dagar.

      # Dygnsstatistik – wrappar history_stats (timmar) till minuter med
      # state_class total_increasing → går in i HA:s long-term stats.
      - name: "AMConnect Daily Mowing Time"
        unique_id: amconnect_daily_mowing_time
        unit_of_measurement: "min"
        state_class: total_increasing
        state: "{{ (states('sensor.amconnect_klipptid_idag_h') | float(0) * 60) | round(0) }}"
      - name: "AMConnect Daily Charging Time"
        unique_id: amconnect_daily_charging_time
        unit_of_measurement: "min"
        state_class: total_increasing
        state: "{{ (states('sensor.amconnect_laddtid_idag_h') | float(0) * 60) | round(0) }}"
      - name: "AMConnect Daily Searching Time"
        unique_id: amconnect_daily_searching_time
        unit_of_measurement: "min"
        state_class: total_increasing
        state: "{{ (states('sensor.amconnect_soktid_idag_h') | float(0) * 60) | round(0) }}"
      - name: "AMConnect Daily Idle Time"
        unique_id: amconnect_daily_idle_time
        unit_of_measurement: "min"
        state_class: total_increasing
        state: "{{ (states('sensor.amconnect_idletid_idag_h') | float(0) * 60) | round(0) }}"

      # Klipp%-andel baserat på history_stats (klipper vs söker).
      - name: "AMConnect Mowing Time Percentage"
        unique_id: amconnect_mowing_time_percentage
        unit_of_measurement: "%"
        state: >
          {% set m = states('sensor.amconnect_klipptid_idag_h') | float(0) %}
          {% set s = states('sensor.amconnect_soktid_idag_h') | float(0) %}
          {{ (100 * m / (m + s)) | round(1) if (m + s) > 0 else 0 }}

      # --- Mowerns interna schema (läsbar form "HH:MM - HH:MM") --------------
      # Mowern har separata pass för vardag (Mon-Fri) och helg (Sat-Sun),
      # bekräftat både av firmwarens 16 timer-fält OCH manualens menu 2-2/2-3.
      #
      # OBS: firmware-bugg gör att "minute"-svaret innehåller hour i hög-byte
      # och minute i låg-byte (men firmware tolkar hela 16-bit som minute).
      # Därför extraherar vi minuten med `% 256`.
      - name: "AMConnect Mower Schedule W1"
        unique_id: amconnect_mower_schedule_w1
        icon: mdi:calendar-week
        state: >-
          {{ '%02d:%02d - %02d:%02d' | format(
            states('sensor.amconnect_mower_w1_start_h') | int(0),
            (states('sensor.amconnect_mower_w1_start_m') | int(0)) % 256,
            states('sensor.amconnect_mower_w1_stop_h')  | int(0),
            (states('sensor.amconnect_mower_w1_stop_m')  | int(0)) % 256
          ) }}

      - name: "AMConnect Mower Schedule W2"
        unique_id: amconnect_mower_schedule_w2
        icon: mdi:calendar-week
        state: >-
          {{ '%02d:%02d - %02d:%02d' | format(
            states('sensor.amconnect_mower_w2_start_h') | int(0),
            (states('sensor.amconnect_mower_w2_start_m') | int(0)) % 256,
            states('sensor.amconnect_mower_w2_stop_h')  | int(0),
            (states('sensor.amconnect_mower_w2_stop_m')  | int(0)) % 256
          ) }}

      # --- Svensk översättning av tysk firmware-status ---------------------
      # Visar "Väntar på status..." när källan är unknown/unavailable
      # (t.ex. precis efter HA-omstart innan första MQTT-pulsen).
      - name: "AMConnect Status Svenska"
        unique_id: amconnect_status_sv
        icon: mdi:translate
        state: >-
          {% set s = states('sensor.amconnect_gps_status') %}
          {% set t = {
            'Mähen': 'Klipper',
            'Mähwerk starten': 'Startar klippmotor',
            'Mähwerk gestartet': 'Klippmotor startad',
            'Starte Mähen': 'Börjar klippa',
            'Laden': 'Laddar',
            'Wartet in Ladestation': 'Väntar i laddstation',
            'Fährt zur Ladestation': 'Kör till laddstation',
            'Andocken': 'Dockar',
            'Verlässt Ladestation': 'Lämnar laddstation',
            'Suchen': 'Söker',
            'Stop': 'Stopp',
            'Festgefahren': 'Fastnat',
            'Fehler': 'Fel',
            'Wartet auf Einsatz': 'Väntar på uppdrag',
            'Folgt Begrenzung': 'Följer kabel',
            'Folgt Suchschleife': 'Följer guidekabel',
            'Schleife folgen': 'Följer slinga',
            'N-Signal gefunden': 'N-signal hittad',
            'Kollision': 'Kollision',
            'Viereckmodus': 'Fyrkantsläge',
            'Linker Radmotor blockiert': 'Vänster hjulmotor blockerad',
            'Kein Schleifensignal': 'Ingen slingsignal',
            'Ausserhalb': 'Utanför arbetsområde',
            'Niedrige Batteriespannung': 'Låg batterispänning',
            'Schlupf bei Rad': 'Hjul slirar',
            'Ladestation blockiert': 'Laddstation blockerad',
            'Benötigt manuelles laden': 'Behöver manuell laddning',
            'Messerteller blockiert': 'Knivskiva blockerad',
            'Mäher hochgehoben': 'Klipparen upplyft',
            'Kein Kontakt in der Ladestation': 'Ingen kontakt i laddstation',
            'Pin abgelaufen': 'PIN utgången',
            'Linker Stossensor defekt': 'Vänster stötsensor defekt',
            'Rechter Stossensor defekt': 'Höger stötsensor defekt'
          } %}
          {% if s in ['unknown', 'unavailable', 'Unknown', '', none] %}
            Väntar på status…
          {% else %}
            {{ t.get(s, s) }}
          {% endif %}

  # --- Sessionslängd: räknas när mowern verkligen är vid dockan ----------
  # Lyssnar på rå tysk status istället för normaliserad lawn_mower-state.
  # "Laden" eller "Wartet in Ladestation" + 60s = otvetydig signal att
  # mowern är dockad för riktigt (laddar eller väntar). Sessions slås
  # inte längre ihop när mowern studsar mot dockan eller MQTT glappar.
  #
  # Skipreglar (sensorn behåller föregående värde → ingen ny datapunkt i
  # statistiken):
  #   - input_boolean.amconnect_session_had_error är ON → session smutsig
  #   - Sanity-check: 0.5–100 min. 220AC med NiMH 2200 mAh klipper
  #     realistiskt max 90 min — 100+ = sessions ihopslagna eller annat fel.
  - trigger:
      - platform: state
        entity_id: sensor.amconnect_gps_status
        to:
          - "Laden"
          - "Wartet in Ladestation"
        for: "00:01:00"
    sensor:
      - name: "AMConnect Last Session Length v3"
        unique_id: amconnect_last_session_length_v3
        unit_of_measurement: "min"
        icon: mdi:timer-outline
        # Returnerar föregående state RAW (inte float(0) → annars korrupteras
        # statistik med 0-värden vid första körning efter restart/rename).
        # Samma state-värde som föregående = ingen state_changed-event = ingen
        # ny statistik-sample. unknown stannar som unknown.
        #
        # Skipreglar (ingen ny datapunkt registreras):
        #   - had_error: mowern fastnade/fel under sessionen
        #   - externally_ended: block aktiverades eller schemat tog slut
        state: >-
          {%- if is_state('input_boolean.amconnect_session_had_error', 'on')
             or is_state('input_boolean.amconnect_session_externally_ended', 'on') -%}
            {{ states('sensor.amconnect_last_session_length_v3') }}
          {%- else -%}
            {%- set start_str = states('input_datetime.amconnect_session_start') -%}
            {%- if start_str not in ['unknown', 'unavailable', '', none] -%}
              {%- set start = as_timestamp(start_str) -%}
              {%- set elapsed_min = (now().timestamp() - start) / 60 -%}
              {%- if elapsed_min > 0.5 and elapsed_min < 100 -%}
                {{ elapsed_min | round(1) }}
              {%- else -%}
                {{ states('sensor.amconnect_last_session_length_v3') }}
              {%- endif -%}
            {%- else -%}
              {{ states('sensor.amconnect_last_session_length_v3') }}
            {%- endif -%}
          {%- endif -%}

  # --- Batterihälsa: fångar peak-mAh när mowern lämnar dockan --------------
  # Triggar exakt när mowern går från Laden/Wartet-state till klipp-state.
  # mAh-värdet vid det ögonblicket = "fräsch full laddning"-kapacitet.
  # Över tid sjunker peak-värdet om batteriet degraderar.
  - trigger:
      - platform: state
        entity_id: sensor.amconnect_gps_status
        from:
          - Laden
          - Wartet in Ladestation
        to:
          - Verlässt Ladestation
          - Mähen
          - Starte Mähen
          - Mähwerk starten
    sensor:
      - name: "AMConnect Last Charge Peak"
        unique_id: amconnect_last_charge_peak
        unit_of_measurement: "mAh"
        icon: mdi:battery-arrow-up
        state: "{{ states('sensor.amconnect_gps_battery_capacity_used_mah') | int(0) }}"

      - name: "AMConnect Battery Health"
        unique_id: amconnect_battery_health
        unit_of_measurement: "%"
        icon: mdi:battery-heart
        state: >
          {% set peak = states('sensor.amconnect_gps_battery_capacity_used_mah') | int(0) %}
          {% set rated = 2200 %}
          {{ (peak / rated * 100) | round(0) if rated > 0 else 0 }}

  # --- Trigger-baserad bladtimer (uppdateras max 1 gång/timme) -------------
  # Lägger DENNA i ett separat trigger-block för att den inte ska
  # uppdateras varje minut som vanliga template-sensorer gör.
  - trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id: input_datetime.amconnect_gps_mahmesser_ersetzt
      - platform: time_pattern
        hours: "/1"
    sensor:
      - name: "AMConnect Time Since Last Blade Change"
        unique_id: amconnect_time_since_last_blade_change
        icon: mdi:knife
        state: >
          {% set last = as_timestamp(states('input_datetime.amconnect_gps_mahmesser_ersetzt')
                       | default('1970-01-01 00:00:00')) %}
          {% set days = ((as_timestamp(now()) - last) / 86400) | int(0) %}
          {% if days <= 0 %}Idag
          {% elif days == 1 %}1 dag
          {% else %}{{ days }} dagar
          {% endif %}


#==============================================================================
# 5. SCRIPTS
#==============================================================================
script:
  # --- Kommando: kör Auto -------------------------------------------------
  amconnect_gps_auto:
    alias: Automower – Auto
    icon: mdi:play
    mode: single
    sequence:
      - service: mqtt.publish
        data: { topic: "AM220AC/command", payload: "setModeAuto" }
      - service: input_select.select_option
        target: { entity_id: input_select.amgps_modus }
        data: { option: Auto }

  # --- Kommando: åk hem (robust med retry vid dålig WiFi) -----------------
  # Skiten i AM220AC är att MQTT är fire-and-forget — om roboten är offline
  # när vi skickar kommandot är det förlorat för alltid. Med dålig
  # WiFi-mottagning på gården = otillförlitlig leverans.
  #
  # Strategi:
  #   FAS 1: Skicka stop+home 3 ggr på 30s för att maxa chansen att en
  #          paket-burst tar sig fram även genom flaky WiFi.
  #   FAS 2: Vänta upp till 2 min på att status går till docked/returning.
  #   FAS 3: Om inte → retry setModeHome var 30s i upp till 8 min till.
  #   FAS 4: Om fortfarande inte → kritisk notis till alla (gå hämta!).
  #
  # mode: restart = om nytt anrop kommer (t.ex. weather + dog samtidigt) så
  # börjar processen om från noll utan att vänta på pågående.
  amconnect_gps_home:
    alias: Automower – Hem (robust)
    icon: mdi:home-import-outline
    mode: restart
    sequence:
      # Markera önskat läge direkt i HA
      - service: input_select.select_option
        target: { entity_id: input_select.amgps_modus }
        data: { option: Home }

      # === FAS 1: Burst — maxa leveranschansen ===========================
      - repeat:
          count: 3
          sequence:
            - service: mqtt.publish
              data: { topic: "AM220AC/command", payload: "setModeStop" }
            - delay: "00:00:03"
            - service: mqtt.publish
              data: { topic: "AM220AC/command", payload: "setModeHome" }
            - delay: "00:00:07"

      # === FAS 2: Vänta upp till 2 min på status-ändring =================
      - wait_template: >-
          {{ states('lawn_mower.automower_220ac') in ['docked', 'returning'] }}
        timeout: "00:02:00"
        continue_on_timeout: true

      # === FAS 3: Inte hemma än → retry var 30 s i upp till 8 min ========
      - if:
          - condition: template
            value_template: >-
              {{ states('lawn_mower.automower_220ac') not in ['docked', 'returning'] }}
        then:
          - repeat:
              sequence:
                - service: mqtt.publish
                  data: { topic: "AM220AC/command", payload: "setModeHome" }
                - wait_template: >-
                    {{ states('lawn_mower.automower_220ac') in ['docked', 'returning'] }}
                  timeout: "00:00:30"
                  continue_on_timeout: true
              until:
                - condition: template
                  value_template: >-
                    {{ states('lawn_mower.automower_220ac') in ['docked', 'returning']
                       or repeat.iteration >= 16 }}

      # === FAS 4: Slutresultat – notis bara vid misslyckat ===============
      # Cooldown: max 1 notis per timme för att undvika spam vid flaky WiFi.
      # Om weather-block / dog-out triggar hem-scriptet flera ggr i rad och
      # det misslyckas varje gång → ändå bara en notis per timme.
      - if:
          - condition: template
            value_template: >-
              {{ states('lawn_mower.automower_220ac') not in ['docked', 'returning'] }}
          - condition: template
            value_template: >-
              {%- set last = states('input_datetime.amconnect_last_critical_alert') -%}
              {%- if last in ['unknown', 'unavailable', '', none] -%}
                true
              {%- else -%}
                {{ (now().timestamp() - as_timestamp(last)) > 3600 }}
              {%- endif -%}
        then:
          - service: notify.owner
            data:
              title: "🆘 Mowern svarar inte"
              message: >-
                Efter ~10 min försök är mowern fortfarande i läge
                {{ states('sensor.amconnect_status_svenska') }}. WiFi-RSSI:
                {{ states('sensor.amconnect_gps_rssi') }} dBm · LWT:
                {{ 'Online' if states('sensor.amconnect_gps_lwt') == '1' else 'OFFLINE' }}.
                Gå ut och hämta den manuellt om vädret kräver det.
          - service: input_datetime.set_datetime
            target: { entity_id: input_datetime.amconnect_last_critical_alert }
            data:
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  # --- Kommando: stopp ----------------------------------------------------
  amconnect_gps_stop:
    alias: Automower – Stopp
    icon: mdi:stop
    mode: single
    sequence:
      - service: mqtt.publish
        data: { topic: "AM220AC/command", payload: "setModeStop" }
      - service: input_select.select_option
        target: { entity_id: input_select.amgps_modus }
        data: { option: Stop }

  # --- Alias för "start" (används av Resume-automationen) ----------------
  amconnect_gps_start:
    alias: Automower – Start (alias för Auto)
    mode: single
    sequence:
      - service: script.turn_on
        target: { entity_id: script.amconnect_gps_auto }

  # --- Hämta alla sensorvärden från mowern -------------------------------
  update_amconnect_sensors:
    alias: Update AMConnect Sensors
    mode: single
    sequence:
      - repeat:
          for_each:
            - getStatus
            - getBatteryVoltage
            - getBatteryCapacityUsed
            - getSpeedKnife
            - getBatteryTemperature
            - getMowingTime
            - getTimerStatus
            - getSpeedRight
            - getSpeedLeft
            - getWifiRSSI
            - getWifiIP
            - getWifiReconnectCount
            - getBatteryCapacity
            # Nya batteridiagnostik-kommandon
            - getBatterySeekStartCapacity
            - getBatteryLastChargingTime
            - getBatteryChargingTime
            - getBatteryChargingTemperature
          sequence:
            - service: mqtt.publish
              data:
                topic: "AM220AC/command"
                payload: "{{ repeat.item }}"
            - delay: "00:00:02"

  # --- Läs mowerns interna schema ----------------------------------------
  # 220AC använder bara W1/W2 (8 fält), inte WE1/WE2. Skickar bara dessa
  # plus timer status och timer day. Svar landar på AM220AC/debug och fångas
  # av timer-MQTT-sensorerna.
  read_mower_schedule:
    alias: Läs mowerns schema (uppdatera HA)
    icon: mdi:download
    mode: single
    sequence:
      - repeat:
          for_each:
            - getWeekTimer1StartHour
            - getWeekTimer1StartMinute
            - getWeekTimer1StopHour
            - getWeekTimer1StopMinute
            - getWeekTimer2StartHour
            - getWeekTimer2StartMinute
            - getWeekTimer2StopHour
            - getWeekTimer2StopMinute
            - getTimerStatus
            - getTimerDay
          sequence:
            - service: mqtt.publish
              data:
                topic: "AM220AC/command"
                payload: "{{ repeat.item }}"
            - delay: "00:00:01"
      - service: notify.owner
        data:
          message: "Schema-data inläst från mowern"

  # --- Läs firmware-version (one-shot vid HA-start) ----------------------
  read_mower_diagnostics:
    alias: Läs mower-firmware-version
    icon: mdi:information-outline
    mode: single
    sequence:
      - service: mqtt.publish
        data:
          topic: "AM220AC/command"
          payload: "getFirmwareVersion"

  # --- Snapshot av nuvarande session-snitt som baseline ------------------
  # Klicka när du bedömer att batteriet är "friskt" (typiskt efter 1-2
  # månaders datainsamling). Sparar 30d-snittet som referensvärde, vidare
  # syns "Session Health %" jämfört med detta.
  set_session_baseline:
    alias: "Sätt session-baseline (snapshot av 30d-snittet)"
    icon: mdi:flag-checkered
    mode: single
    sequence:
      - service: input_number.set_value
        target: { entity_id: input_number.amconnect_session_baseline_min }
        data:
          value: "{{ states('sensor.amconnect_session_length_avg_30d_v3') | float(0) | round(1) }}"
      - service: input_datetime.set_datetime
        target: { entity_id: input_datetime.amconnect_session_baseline_set }
        data:
          date: "{{ now().strftime('%Y-%m-%d') }}"
      - service: notify.owner
        data:
          message: >-
            Session-baseline satt till
            {{ states('sensor.amconnect_session_length_avg_30d_v3') | float(0) | round(1) }} min.

  # --- Nollställ bladbyte-datum ------------------------------------------
  reset_blade_replacement_date:
    alias: Nollställ bladbyte-datum
    icon: mdi:knife
    mode: single
    sequence:
      - service: input_datetime.set_datetime
        target: { entity_id: input_datetime.amconnect_gps_mahmesser_ersetzt }
        data:
          date: "{{ now().strftime('%Y-%m-%d') }}"
      - service: notify.owner
        data:
          message: "Bladbyte-datum nollställt till idag"


#==============================================================================
# 6. AUTOMATIONER
#==============================================================================
automation:
  # --- Periodisk uppdatering av sensorer (varje minut) -------------------
  - alias: "Automower – Hämta sensorvärden"
    id: automower_periodic_update
    triggers:
      - trigger: time_pattern
        minutes: "/1"
    actions:
      - service: script.turn_on
        target: { entity_id: script.update_amconnect_sensors }
    mode: single

  # --- Läs schemat från mowern vid HA-start ------------------------------
  # Schema-sensorerna är MQTT-baserade och tappar state vid HA-omstart.
  # 30s delay = vänta tills MQTT-brokern är uppe och mower-LWT är "online".
  - alias: "Automower – Läs schema vid HA-start"
    id: automower_read_schedule_on_start
    triggers:
      - trigger: homeassistant
        event: start
    actions:
      - delay: "00:00:30"
      - service: script.turn_on
        target: { entity_id: script.read_mower_schedule }
      # Vänta tills schema-läsningen är klar (~18s), kör sedan diagnostik
      - delay: "00:00:30"
      - service: script.turn_on
        target: { entity_id: script.read_mower_diagnostics }
    mode: single


  # --- Spara session-start när mowern lämnar dockan ----------------------
  # Triggar på ALLA övergångar FRÅN dock-tillstånd (Laden eller Wartet in
  # Ladestation) till annat tillstånd. Robust mot att mowern hoppar över
  # "Verlässt Ladestation" om MQTT-statusen byts snabbt → vi ser då
  # bara from-staten och fångar transitionen.
  - alias: "Automower – Spara session-start"
    id: automower_save_session_start
    triggers:
      - trigger: state
        entity_id: sensor.amconnect_gps_status
        from:
          - "Laden"
          - "Wartet in Ladestation"
    conditions:
      # Förhindra att vi triggar när mowern går FRÅN dock-state TILL ett annat
      # dock-state (skulle aldrig hända i praktiken men säkert är säkert)
      - condition: template
        value_template: >-
          {{ trigger.to_state.state not in ['Laden', 'Wartet in Ladestation'] }}
    actions:
      - service: input_datetime.set_datetime
        target: { entity_id: input_datetime.amconnect_session_start }
        data:
          timestamp: "{{ now().timestamp() }}"
      - service: input_boolean.turn_off
        target:
          entity_id:
            - input_boolean.amconnect_session_had_error
            - input_boolean.amconnect_session_externally_ended
    mode: single

  # --- Markera session som externt avbruten ------------------------------
  # Triggar om något block aktiveras, ELLER om klippschemats fönster tar
  # slut, MEDAN mowern är ute. Sessionen var då inte batteribegränsad och
  # ska inte räknas i batterihälsa-statistiken.
  - alias: "Automower – Markera session som externt avbruten"
    id: automower_session_mark_externally_ended
    triggers:
      - trigger: state
        entity_id: input_boolean.automower_weather_block
        to: "on"
      - trigger: state
        entity_id: input_boolean.automower_manual_block
        to: "on"
      - trigger: state
        entity_id: input_boolean.automower_dog_outside
        to: "on"
      - trigger: state
        entity_id: binary_sensor.automower_inom_klippschema
        to: "off"
    conditions:
      # Bara om mowern ÄR ute när detta händer — om hon redan står dockad
      # är detta inte ett pågående-session-avbrott utan bara state-info.
      - condition: template
        value_template: >-
          {{ states('sensor.amconnect_gps_status') not in
             ['Laden', 'Wartet in Ladestation', 'Wartet auf Einsatz', 'Stop'] }}
    actions:
      - service: input_boolean.turn_on
        target: { entity_id: input_boolean.amconnect_session_externally_ended }
    mode: single

  # --- Markera session som "smutsig" om fel inträffar --------------------
  # Triggar vid alla allvarliga felstatus med 60s debounce (transient
  # festgefahren under utbackning räknas inte). När flaggan är ON kommer
  # session-längd-sensorn att skippa uppdatering vid nästa dock-tillfälle
  # → den session försvinner ur statistiken.
  - alias: "Automower – Markera session som felfylld"
    id: automower_session_mark_error
    triggers:
      - trigger: state
        entity_id: sensor.amconnect_gps_status
        to:
          - Festgefahren
          - Fehler
          - Linker Radmotor blockiert
          - Kein Schleifensignal
          - Ausserhalb
          - Niedrige Batteriespannung
          - Ladestation blockiert
          - Benötigt manuelles laden
          - Messerteller blockiert
          - Mäher hochgehoben
          - Kein Kontakt in der Ladestation
          - Pin abgelaufen
          - Linker Stossensor defekt
          - Rechter Stossensor defekt
        for: "00:01:00"
    actions:
      - service: input_boolean.turn_on
        target: { entity_id: input_boolean.amconnect_session_had_error }
    mode: single

  # --- Räkna laddningscykler ---------------------------------------------
  # Inkrementerar vid varje övergång från Laden/Wartet → klipp-läge.
  # NiMH klarar typiskt 500-1000 cykler innan märkbar degradering.
  - alias: "Automower – Räkna laddningscykler"
    id: automower_count_charge_cycles
    triggers:
      - trigger: state
        entity_id: sensor.amconnect_gps_status
        from:
          - Laden
          - Wartet in Ladestation
        to:
          - Verlässt Ladestation
          - Mähen
          - Starte Mähen
          - Mähwerk starten
    actions:
      - service: counter.increment
        target: { entity_id: counter.amconnect_charge_cycles }
    mode: single

  # --- Nollställ klipp-spår på kartan vid midnatt ------------------------
  # Tar bort historisk position-data från recorder så kartan
  # börjar tom igen varje dygn.
  - alias: "Automower – Rensa spårkarta midnatt"
    id: automower_purge_track_midnight
    triggers:
      - trigger: time
        at: "00:00:00"
    actions:
      - service: recorder.purge_entities
        data:
          entity_id:
            - sensor.amconnect_gps_location
            - sensor.amconnect_gps_latitude
            - sensor.amconnect_gps_longitude
          keep_days: 0
    mode: single

  # --- Väderblock baserat på SMHI ----------------------------------------
  - alias: "Automower – Uppdatera väderblockering"
    id: automower_weather_block_update
    triggers:
      - trigger: state
        entity_id: weather.smhi_home
      - trigger: state
        entity_id: sensor.amconnect_weather_stop_triggered
    actions:
      - choose:
          - conditions:
              - condition: state
                entity_id: sensor.amconnect_weather_stop_triggered
                state: "true"
            sequence:
              - service: input_boolean.turn_on
                target: { entity_id: input_boolean.automower_weather_block }
        default:
          - service: input_boolean.turn_off
            target: { entity_id: input_boolean.automower_weather_block }
    mode: single

  # --- Återuppta klippning när hund/väder/manuell är OK ------------------
  # Kräver att ALLA tre block-villkor är OFF innan klipparen åker ut.
  # Väderblock OFF → 30 min karens (marken kan vara våt fortfarande).
  # Hund/manuell OFF → resume direkt (du vet bäst när det är OK).
  - alias: "Automower – Återuppta när allt klart"
    id: automower_resume_when_clear
    triggers:
      - trigger: state
        entity_id: input_boolean.automower_dog_outside
        to: "off"
        id: dog
      - trigger: state
        entity_id: input_boolean.automower_weather_block
        to: "off"
        id: weather
      - trigger: state
        entity_id: input_boolean.automower_manual_block
        to: "off"
        id: manual
    conditions:
      - condition: state
        entity_id: input_boolean.automower_dog_outside
        state: "off"
      - condition: state
        entity_id: input_boolean.automower_weather_block
        state: "off"
      - condition: state
        entity_id: input_boolean.automower_manual_block
        state: "off"
    actions:
      # Vänta 30 min efter väderblock, annars kör direkt
      - delay:
          minutes: "{{ 30 if trigger.id == 'weather' else 0 }}"
      - service: script.turn_on
        target: { entity_id: script.amconnect_gps_auto }
    mode: single

  # --- Pausa mower när hunden är ute -------------------------------------
  - alias: "Automower – Pausa när hund ute"
    id: automower_pause_dog_out
    triggers:
      - trigger: state
        entity_id: input_boolean.automower_dog_outside
        to: "on"
    actions:
      - service: script.turn_on
        target: { entity_id: script.amconnect_gps_home }
    mode: single

  # --- Mowern har stannat / fel (notis till owner) -----------------------
  # Lyssnar på rå-statusen istället för lawn_mower-entiteten, eftersom
  # firmwaren rapporterar "Festgefahren" transient under normal körning.
  # 5 min filter = bara verkliga stuck-händelser larmar.
  - alias: "Automower – Fel-larm"
    id: automower_error_alert
    triggers:
      - trigger: state
        entity_id: sensor.amconnect_gps_status
        to:
          - Festgefahren
          - Fehler
          - Linker Radmotor blockiert
          - Kein Schleifensignal
          - Ausserhalb
          - Niedrige Batteriespannung
          - Ladestation blockiert
          - Benötigt manuelles laden
          - Messerteller blockiert
          - Mäher hochgehoben
          - Kein Kontakt in der Ladestation
          - Pin abgelaufen
          - Linker Stossensor defekt
          - Rechter Stossensor defekt
        for:
          minutes: 5   # filtrera bort transient festgefahren under utbackning
    actions:
      - service: notify.owner
        data:
          title: "🤖 Klipparen har stannat"
          message: >-
            Orsak: {{ states('sensor.amconnect_gps_status') }} ·
            Batteri {{ states('sensor.amconnect_battery_charge') }} % ·
            Senaste position: {{ states('sensor.amconnect_gps_latitude') }},
            {{ states('sensor.amconnect_gps_longitude') }}
    mode: single

  # --- Skicka HEM när väderblock aktiveras (auto från SMHI) --------------
  - alias: "Automower – Skicka hem vid väderblock"
    id: automower_send_home_on_weather_block
    triggers:
      - trigger: state
        entity_id: input_boolean.automower_weather_block
        to: "on"
    actions:
      - service: script.turn_on
        target: { entity_id: script.amconnect_gps_home }
      - service: notify.owner
        data:
          message: >-
            {%- set reason = state_attr('sensor.amconnect_weather_stop_triggered', 'reason') -%}
            Mowern skickad hem pga {{ (reason | lower) if reason and reason != 'Inget' else 'väder' }}
    mode: single

  # --- Skicka HEM när manuellt block aktiveras (du klickar) --------------
  - alias: "Automower – Skicka hem vid manuellt block"
    id: automower_send_home_on_manual_block
    triggers:
      - trigger: state
        entity_id: input_boolean.automower_manual_block
        to: "on"
    actions:
      - service: script.turn_on
        target: { entity_id: script.amconnect_gps_home }
      - service: notify.owner
        data:
          message: "Mowern skickad hem (manuellt block aktiverat)"
    mode: single

  # --- Säkerhetsnät: klipparen körde ut trots block ----------------------
  # Triggar när lawn_mower-state går till "mowing" (oavsett från vilket
  # tidigare state). Om något block är aktivt just då betyder det att
  # mowern missade hem-kommandot — sannolikt pga WiFi-tapp vid utskick.
  # Då: re-trigga hem-scriptet + notis till ALLA.
  # 1h cooldown så vi inte spammar om mowern flappar mowing/paused upprepat.
  - alias: "Automower – Larma om klipparen åker ut under block"
    id: automower_escaped_block_alert
    triggers:
      - trigger: state
        entity_id: lawn_mower.automower_220ac
        to: mowing
    conditions:
      # Något block måste vara ON
      - condition: or
        conditions:
          - condition: state
            entity_id: input_boolean.automower_manual_block
            state: "on"
          - condition: state
            entity_id: input_boolean.automower_weather_block
            state: "on"
          - condition: state
            entity_id: input_boolean.automower_dog_outside
            state: "on"
      # Cooldown: max 1 notis per timme
      - condition: template
        value_template: >-
          {%- set last = states('input_datetime.amconnect_last_escaped_alert') -%}
          {%- if last in ['unknown', 'unavailable', '', none] -%}
            true
          {%- else -%}
            {{ (now().timestamp() - as_timestamp(last)) > 3600 }}
          {%- endif -%}
    actions:
      # 1. Försök skicka hem igen
      - service: script.turn_on
        target: { entity_id: script.amconnect_gps_home }
      # 2. Notis till owner
      - service: notify.owner
        data:
          title: "⚠️ Klipparen körde ut trots block"
          message: >-
            {%- set b = namespace(list=[]) -%}
            {%- if is_state('input_boolean.automower_manual_block', 'on') %}{%- set b.list = b.list + ['manuellt block'] %}{%- endif -%}
            {%- if is_state('input_boolean.automower_weather_block', 'on') %}{%- set b.list = b.list + ['väderblock'] %}{%- endif -%}
            {%- if is_state('input_boolean.automower_dog_outside', 'on') %}{%- set b.list = b.list + ['hund ute'] %}{%- endif -%}
            Mowern började klippa fast {{ b.list | join(' + ') }} är ON —
            troligen missade hem-kommandot pga dålig WiFi. Försöker skicka
            hem på nytt. RSSI: {{ states('sensor.amconnect_gps_rssi') }} dBm.
      # 3. Spara tidsstämpel för cooldown
      - service: input_datetime.set_datetime
        target: { entity_id: input_datetime.amconnect_last_escaped_alert }
        data:
          datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    mode: single
